name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile packages
        run: python -m compileall ocr_parser dots_ocr ocr_platform

      - name: Run tests
        run: pytest tests

      - name: Check documentation links
        run: python tools/check_docs_links.py

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build --wheel
      - name: Install wheel in an empty environment
        run: |
          python -m venv /tmp/ocrparser-wheel
          WHEEL="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          /tmp/ocrparser-wheel/bin/python -m pip install "${WHEEL}[platform]"
          /tmp/ocrparser-wheel/bin/python tools/check_installed_console_scripts.py --bin-dir /tmp/ocrparser-wheel/bin
          # Avoid the build-created source-tree egg-info shadowing the wheel's
          # installed dist-info during metadata and license inventory checks.
          cd /tmp
          /tmp/ocrparser-wheel/bin/python - <<'PY'
          from importlib.resources import files
          from importlib.metadata import distribution, entry_points, version
          from pathlib import Path
          assert version("ocrparser-platform") == "0.2.1"
          names = {item.name for item in entry_points(group="console_scripts")}
          assert {
              "ocr-parser",
              "ocr-platform-control",
              "ocr-platform-agent",
              "ocr-platform-migrate",
          } <= names
          assert files("ocr_platform.control").joinpath("ui/index.html").is_file()
          assert files("ocr_platform.control").joinpath(
              "migrations/0019_schema_migration_checksums.sql"
          ).is_file()
          license_names = {
              Path(str(item)).name
              for item in distribution("ocrparser-platform").files or []
              if "/licenses/" in str(item)
          }
          assert {
              "LICENSE",
              "NOTICE",
              "AGPL_3.0.txt",
              "APACHE_2.0.txt",
              "DOTS_OCR_LICENSE.txt",
          } <= license_names
          PY

  install-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        profile: [base, platform, s3, layout, full]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build --wheel
      - name: Install and verify ${{ matrix.profile }} profile
        run: |
          PROFILE="${{ matrix.profile }}"
          VENV="/tmp/ocrparser-${PROFILE}"
          python -m venv "$VENV"
          WHEEL="$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          SPEC="$WHEEL"
          if [[ "$PROFILE" != "base" ]]; then
            SPEC="${WHEEL}[${PROFILE}]"
          fi
          "$VENV/bin/python" -m pip install "$SPEC"
          "$VENV/bin/python" tools/check_install_profile.py \
            --profile "$PROFILE" \
            --bin-dir "$VENV/bin" \
            --repo-root "$PWD"
          if [[ "$PROFILE" == "platform" || "$PROFILE" == "full" ]]; then
            "$VENV/bin/python" tools/check_installed_console_scripts.py --bin-dir "$VENV/bin"
          fi

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ocr_platform
          POSTGRES_PASSWORD: ocr_platform
          POSTGRES_DB: ocr_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ocr_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Apply real PostgreSQL migrations under concurrent startup
        run: |
          ocr-platform-migrate apply --database-url "$DATABASE_URL" > /tmp/migrate-1.json &
          first_pid=$!
          ocr-platform-migrate apply --database-url "$DATABASE_URL" > /tmp/migrate-2.json &
          second_pid=$!
          wait "$first_pid"
          wait "$second_pid"
        env:
          DATABASE_URL: postgresql+psycopg://ocr_platform:ocr_platform@127.0.0.1:5432/ocr_platform
      - name: Verify migration history and checksums
        run: ocr-platform-migrate verify --database-url "$DATABASE_URL"
        env:
          DATABASE_URL: postgresql+psycopg://ocr_platform:ocr_platform@127.0.0.1:5432/ocr_platform
      - name: Verify concurrent shard and scan-unit claims
        run: >-
          python tools/pg_claim_stress.py --database-url "$DATABASE_URL"
          --apply-init-db --shards 32 --workers 8 --scan-units 8
          --scan-unit-shards 2 --json
        env:
          DATABASE_URL: postgresql+psycopg://ocr_platform:ocr_platform@127.0.0.1:5432/ocr_platform

  mock-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Run Control to Artifact walkthrough
        run: python tools/run_mock_e2e.py
